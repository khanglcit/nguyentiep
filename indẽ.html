<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nguyễn Tiệp - Hệ Thống Quản Lý & Mua Sắm</title>
    <style>
        /* Toàn bộ thiết kế giao diện (CSS) */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f6f9;
            color: #333;
        }

        /* Thanh điều hướng chính */
        header {
            background-color: #ffffff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #0056b3;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nav-modes {
            display: flex;
            gap: 15px;
        }

        .btn-mode {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .btn-customer {
            background-color: #28a745;
            color: white;
        }

        .btn-seller {
            background-color: #17a2b8;
            color: white;
        }

        .btn-mode.active {
            transform: scale(1.05);
            box-shadow: 0 0 0 3px #333;
        }

        /* Khu vực hiển thị nội dung */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }

        /* ==================== 1. GIAO DIỆN KHÁCH HÀNG ==================== */
        .hero-banner {
            background: linear-gradient(135deg, #0056b3, #00a2ff);
            color: white;
            padding: 50px 30px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 40px;
        }

        .hero-banner h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #e9ecef;
        }

        .product-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #222;
        }

        .product-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .product-price {
            font-size: 18px;
            font-weight: bold;
            color: #dc3545;
            margin-bottom: 15px;
        }

        .btn-action {
            background-color: #0056b3;
            color: white;
            text-align: center;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn-action:hover {
            background-color: #004085;
        }

        /* ==================== 2. GIAO DIỆN NHÀ BÁN HÀNG ==================== */
        .seller-dashboard {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .seller-dashboard { grid-template-columns: 1fr; }
        }

        .panel-box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .panel-box h2 {
            margin-bottom: 20px;
            color: #17a2b8;
            font-size: 20px;
            border-bottom: 2px solid #f4f6f9;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            height: 80px;
        }

        .btn-submit {
            background-color: #17a2b8;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
        }

        .btn-submit:hover {
            background-color: #138496;
        }

        /* Bảng quản lý sản phẩm */
        .table-responsive {
            overflow-x: auto;
        }

        .manage-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            font-size: 14px;
        }

        .manage-table th, .manage-table td {
            padding: 12px;
            border: 1px solid #dee2e6;
            text-align: left;
        }

        .manage-table th {
            background-color: #f8f9fa;
            font-weight: 600;
        }

        .btn-delete {
            background-color: #dc3545;
            color: white;
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-delete:hover {
            background-color: #bd2130;
        }

        .no-data {
            text-align: center;
            color: #888;
            padding: 40px;
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Nguyễn Tiệp</div>
        <div class="nav-modes">
            <button class="btn-mode btn-customer active" onclick="switchMode('customer')">Bản Khách Hàng</button>
            <button class="btn-mode btn-seller" onclick="switchMode('seller')">Bản Nhà Bán Hàng</button>
        </div>
    </header>

    <div class="container">
        
        <section id="customer-view" class="view-section active">
            <div class="hero-banner">
                <h1>Chào mừng đến với Nguyễn Tiệp Store</h1>
                <p>Nơi cung cấp các sản phẩm chất lượng và bất động sản uy tín hàng đầu</p>
            </div>
            
            <div class="product-grid" id="customer-product-list">
                </div>
        </section>

        <section id="seller-view" class="view-section">
            <div class="seller-dashboard">
                
                <div class="panel-box">
                    <h2>Thêm Sản Phẩm Mới</h2>
                    <form id="product-form" onsubmit="addProduct(event)">
                        <div class="form-group">
                            <label for="p-name">Tên sản phẩm / Bất động sản</label>
                            <input type="text" id="p-name" required placeholder="Ví dụ: Nhà mặt phố, iPhone 15...">
                        </div>
                        <div class="form-group">
                            <label for="p-price">Giá thành (VNĐ hoặc thỏa thuận)</label>
                            <input type="text" id="p-price" required placeholder="Ví dụ: 2.5 tỷ, 15.000.000đ...">
                        </div>
                        <div class="form-group">
                            <label for="p-img">Đường dẫn ảnh (URL)</label>
                            <input type="url" id="p-img" placeholder="https://example.com/hinh-anh.jpg">
                        </div>
                        <div class="form-group">
                            <label for="p-desc">Mô tả ngắn gọn</label>
                            <textarea id="p-desc" required placeholder="Nhập đặc điểm nổi bật, vị trí, thông số..."></textarea>
                        </div>
                        <button type="submit" class="btn-submit">Đăng Bán Ngay</button>
                    </form>
                </div>

                <div class="panel-box">
                    <h2>Danh Sách Sản Phẩm Đang Khảo Sát</h2>
                    <div class="table-responsive">
                        <table class="manage-table">
                            <thead>
                                <tr>
                                    <th>Sản phẩm</th>
                                    <th>Giá</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody id="seller-product-list">
                                </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </section>

    </div>

    <script>
        // Mẫu dữ liệu mặc định ban đầu nếu bộ nhớ trống
        const defaultProducts = [
            {
                id: 1718567200000,
                name: "Biệt thự cao cấp phân khu trung tâm",
                price: "15 Tỷ VNĐ",
                img: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=800&q=80",
                desc: "Diện tích 200m2, hướng Đông Nam, đầy đủ tiện ích nội khu cao cấp, giao thông thuận tiện."
            },
            {
                id: 1718567210000,
                name: "Đất nền dự án tiềm năng sinh lời",
                price: "3.2 Tỷ VNĐ",
                img: "https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&w=800&q=80",
                desc: "Sổ đỏ chính chủ, pháp lý rõ ràng, mặt đường lớn thích hợp kinh doanh hoặc đầu tư lâu dài."
            }
        ];

        // Lấy dữ liệu từ localStorage hoặc dùng dữ liệu mẫu
        let products = JSON.parse(localStorage.getItem('nguyenTiepProducts')) || defaultProducts;

        // Hàm chuyển đổi qua lại giữa bản Khách hàng và Bản Nhà bán hàng
        function switchMode(mode) {
            document.querySelectorAll('.btn-mode').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(view => view.classList.remove('active'));

            if (mode === 'customer') {
                document.querySelector('.btn-customer').classList.add('active');
                document.getElementById('customer-view').classList.add('active');
                renderCustomerProducts();
            } else {
                document.querySelector('.btn-seller').classList.add('active');
                document.getElementById('seller-view').classList.add('active');
                renderSellerProducts();
            }
        }

            container.innerHTML = '';
